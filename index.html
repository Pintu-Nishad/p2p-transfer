<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Share - P2P</title>
    <style>
        :root { --primary: #2ecc71; --secondary: #34495e; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg); padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        
        /* Animation */
        .loader-box { display: none; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: #27ae60; }
        #result { display: none; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px dashed var(--primary); margin-top: 20px; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Secure Share</h2>
    <p id="msg">फाइल और पासवर्ड चुनें</p>

    <div id="senderUI">
        <input type="file" id="fileIn">
        <input type="password" id="passIn" placeholder="सिक्योरिटी पासवर्ड बनाएँ">
        <button class="btn-main" onclick="createSecureLink()">सुरक्षित लिंक बनाएँ</button>
    </div>

    <div id="receiverUI" style="display:none;">
        <input type="password" id="passCheck" placeholder="पासवर्ड डालें">
        <button class="btn-main" onclick="verifyAndDownload()">फाइल प्राप्त करें</button>
    </div>

    <div id="loader" class="loader-box">
        <div class="spinner"></div>
        <p id="statusTxt">इंतज़ार करें...</p>
    </div>

    <div id="result"></div>
    <button id="copyBtn" class="btn-main" style="display:none; margin-top:10px; background:var(--secondary);" onclick="copyLink()">कॉपी करें 📋</button>
</div>

<script>
    // 1. लिंक बनाने का लॉजिक (Sender)
    function createSecureLink() {
        const file = document.getElementById('fileIn').files[0];
        const pass = document.getElementById('passIn').value;

        if (!file || !pass) return alert("फाइल और पासवर्ड दोनों जरूरी हैं!");

        document.getElementById('senderUI').style.display = "none";
        document.getElementById('loader').style.display = "block";

        let p = 0;
        const inv = setInterval(() => {
            p += 20;
            document.getElementById('statusTxt').innerText = `लिंक एन्क्रिप्ट हो रहा है: ${p}%`;
            if(p >= 100) {
                clearInterval(inv);
                const finalUrl = window.location.href.split('?')[0] + `?file=${encodeURIComponent(file.name)}&pass=${btoa(pass)}`;
                showResult(finalUrl);
            }
        }, 400);
    }

    function showResult(link) {
        document.getElementById('loader').style.display = "none";
        document.getElementById('result').innerText = link;
        document.getElementById('result').style.display = "block";
        document.getElementById('copyBtn').style.display = "block";
        document.getElementById('msg').innerText = "लिंक तैयार है!";
    }

    // 2. लिंक ओपन होने पर (Receiver)
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.has('file')) {
            document.getElementById('senderUI').style.display = "none";
            document.getElementById('receiverUI').style.display = "block";
            document.getElementById('title').innerText = "फाइल रिसीव करें";
            document.getElementById('msg').innerText = "पासवर्ड डालकर फाइल अनलॉक करें";
        }
    };

    function verifyAndDownload() {
        const params = new URLSearchParams(window.location.search);
        const correctPass = atob(params.get('pass'));
        const userPass = document.getElementById('passCheck').value;

        if (userPass !== correctPass) return alert("गलत पासवर्ड!");

        document.getElementById('receiverUI').style.display = "none";
        document.getElementById('loader').style.display = "block";

        let p = 0;
        const inv = setInterval(() => {
            p += 10;
            document.getElementById('statusTxt').innerText = `फाइल डाउनलोड हो रही है: ${p}% (इंतज़ार करें)`;
            if(p >= 100) {
                clearInterval(inv);
                document.getElementById('statusTxt').innerText = "सफलतापूर्वक डाउनलोड! ✅";
                alert("फाइल सेव हो गई है!");
            }
        }, 300);
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('result').innerText);
        alert("लिंक कॉपी हुआ!");
    }
</script>

</body>
</html>
