<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure P2P Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #34495e; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg); padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .loader { display: none; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #linkBox { display: none; background: #e8f5e9; padding: 15px; border-radius: 12px; border: 1px dashed var(--primary); margin-top: 20px; word-break: break-all; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="mainTitle">Secure Share</h2>
    <p id="statusMsg">फाइल चुनें और पासवर्ड सेट करें</p>

    <div id="uiContainer">
        <input type="file" id="fileInput">
        <input type="password" id="passwordInput" placeholder="पासवर्ड बनाएँ">
        <button class="btn-main" onclick="initSender()">सुरक्षित लिंक बनाएँ</button>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p id="loaderTxt">कनेक्ट हो रहा है... इंतज़ार करें</p>
    </div>

    <div id="linkBox"></div>
</div>

<script>
    let peer;
    let myFile;
    let myPassword;

    // 1. भेजने वाले का लॉजिक
    function initSender() {
        myFile = document.getElementById('fileInput').files[0];
        myPassword = document.getElementById('passwordInput').value;

        if (!myFile || !myPassword) return alert("फाइल और पासवर्ड दोनों भरें!");

        document.getElementById('uiContainer').style.display = "none";
        document.getElementById('loader').style.display = "block";

        peer = new Peer(); // नया Peer ID जनरेट होगा

        peer.on('open', (id) => {
            const shareUrl = window.location.href.split('?')[0] + `?peer=${id}&name=${encodeURIComponent(myFile.name)}&pass=${btoa(myPassword)}`;
            document.getElementById('loader').style.display = "none";
            const lb = document.getElementById('linkBox');
            lb.innerHTML = `<strong>लिंक तैयार है:</strong><br>${shareUrl}<br><br><button class="btn-main" onclick="copyText('${shareUrl}')">लिंक कॉपी करें</button>`;
            lb.style.display = "block";
            document.getElementById('statusMsg').innerText = "फाइल भेजने के लिए तैयार है (पेज बंद न करें)";
        });

        // जब कोई दूसरा यूजर कनेक्ट हो
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'request' && data.pass === myPassword) {
                    document.getElementById('statusMsg').innerText = "फाइल भेजी जा रही है...";
                    conn.send({ file: myFile, fileName: myFile.name, type: 'file' });
                }
            });
        });
    }

    // 2. पाने वाले का लॉजिक (Receiver)
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.has('peer')) {
            document.getElementById('uiContainer').innerHTML = `
                <p>फाइल: <strong>${params.get('name')}</strong></p>
                <input type="password" id="checkPass" placeholder="पासवर्ड डालें">
                <button class="btn-main" onclick="connectToSender()">डाउनलोड करें</button>
            `;
            document.getElementById('statusMsg').innerText = "फाइल प्राप्त करने के लिए पासवर्ड डालें";
        }
    };

    function connectToSender() {
        const params = new URLSearchParams(window.location.search);
        const targetPeerId = params.get('peer');
        const enteredPass = document.getElementById('checkPass').value;

        document.getElementById('uiContainer').style.display = "none";
        document.getElementById('loader').style.display = "block";
        document.getElementById('loaderTxt').innerText = "भेजने वाले से कनेक्ट हो रहा है... इंतज़ार करें";

        const receiverPeer = new Peer();
        receiverPeer.on('open', () => {
            const conn = receiverPeer.connect(targetPeerId);
            conn.on('open', () => {
                conn.send({ type: 'request', pass: enteredPass });
            });

            conn.on('data', (data) => {
                if (data.type === 'file') {
                    const blob = new Blob([data.file]);
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = data.fileName;
                    a.click();
                    
                    document.getElementById('loader').style.display = "none";
                    document.getElementById('statusMsg').innerText = "फाइल सफलतापूर्वक डाउनलोड हुई! ✅";
                }
            });
        });
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert("लिंक कॉपी हो गया!");
    }
</script>

</body>
</html>
