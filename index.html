<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Share - Real-Time P2P Transfer</title>
    <meta name="description" content="Send large files securely using P2P technology. Created by Pintu Nishad.">
    <meta name="keywords" content="P2P File Transfer, Secure Share, Pintu Nishad, Fast Data Send">
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #34495e; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: var(--bg); padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; overflow: hidden; }
        
        /* Animation CSS */
        #animationContainer { display: none; margin: 40px 0; position: relative; height: 120px; border-top: 1px solid #eee; padding-top: 20px; }
        .icon-box { position: absolute; top: 30px; width: 60px; height: 60px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 2; }
        #senderIcon { left: 0; } #receiverIcon { right: 0; }
        .particle { position: absolute; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; opacity: 0; }
        
        @keyframes transfer {
            0% { left: 60px; opacity: 0; }
            50% { opacity: 1; }
            100% { left: calc(100% - 60px); opacity: 0; }
        }

        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link-display { background: #f8f9fa; padding: 10px; border-radius: 10px; word-break: break-all; border: 1px dashed var(--primary); margin: 15px 0; font-size: 13px; }
        
        /* Progress Bar */
        .progress-wrapper { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-top: 10px; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); border-radius: 5px; transition: width 0.2s; }
        
        .footer { margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>Secure Share</h2>
    <p id="peerIdDisplay" style="font-size: 12px; color: var(--primary);">Connecting to Server...</p>

    <div id="setupSection">
        <input type="file" id="fileSelector">
        <button class="btn-main" onclick="initiateTransfer()">Generate Secure Link</button>
    </div>

    <div id="animationContainer">
        <div class="icon-box" id="senderIcon">📤</div>
        <div class="icon-box" id="receiverIcon">📥</div>
        <div class="progress-wrapper" id="pWrapper"><div class="progress-fill" id="pFill"></div></div>
        <p id="statusInfo" style="margin-top: 80px; font-weight: bold;">0% Transferring...</p>
    </div>

    <div id="resultSection" style="display:none;">
        <div class="link-display" id="finalLink">Generating...</div>
        <button class="btn-main" style="background:var(--secondary)" onclick="copyLink()">Copy Link 📋</button>
    </div>
</div>

<div class="footer"><b>Created by Pintu Nishad</b></div>

<script>
    const peer = new Peer(); 
    let conn;
    let myId = "";

    // 1. Peer ID Generate karna aur Link banana
    peer.on('open', (id) => {
        myId = id;
        document.getElementById('peerIdDisplay').innerText = "Status: Online ✅";
    });

    // 2. Receiver Side: Jab koi link se connect kare
    peer.on('connection', (connection) => {
        conn = connection;
        setupDataListeners();
        showAnimation();
    });

    function initiateTransfer() {
        const file = document.getElementById('fileSelector').files[0];
        if (!file) return alert("File chunein!");
        
        const shareUrl = window.location.href.split('?')[0] + "?join=" + myId;
        document.getElementById('finalLink').innerText = shareUrl;
        document.getElementById('resultSection').style.display = "block";
        alert("Link taiyar hai! Ise dusre device par kholein.");
    }

    // URL check karna agar koi join kar raha hai
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if (joinId) {
        document.getElementById('setupSection').innerHTML = "<h3>Receiving File...</h3>";
        const connectToPeer = peer.connect(joinId);
        conn = connectToPeer;
        setupDataListeners();
        showAnimation();
    }

    function setupDataListeners() {
        conn.on('open', () => {
            const file = document.getElementById('fileSelector').files[0];
            if(file) {
                // Chunking logic for Large Files
                const chunkSize = 16384;
                let offset = 0;
                
                const readSlice = (o) => {
                    const slice = file.slice(offset, o + chunkSize);
                    const reader = new FileReader();
                    reader.onload = e => {
                        conn.send({ data: e.target.result, name: file.name, size: file.size, offset: offset });
                        offset += chunkSize;
                        updateUI(offset, file.size);
                        if (offset < file.size) readSlice(offset);
                    };
                    reader.readAsArrayBuffer(slice);
                };
                readSlice(0);
            }
        });

        let receivedData = [];
        conn.on('data', (data) => {
            // Receiver side progress
            updateUI(data.offset, data.size);
            receivedData.push(data.data);
            
            if (data.offset + 16384 >= data.size) {
                const blob = new Blob(receivedData);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = data.name; a.click();
                document.getElementById('statusInfo').innerText = "Download Complete! ✅";
            }
        });
    }

    function updateUI(current, total) {
        const pct = Math.round((current / total) * 100);
        document.getElementById('pFill').style.width = pct + "%";
        document.getElementById('statusInfo').innerText = pct + "% Transferred";
    }

    function showAnimation() {
        document.getElementById('animationContainer').style.display = "block";
        document.getElementById('pWrapper').style.display = "block";
        // Particles create karna
        for(let i=0; i<5; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.top = "60px";
            p.style.animation = `transfer 1.5s infinite linear ${i*0.3}s`;
            document.getElementById('animationContainer').appendChild(p);
        }
    }

    function copyLink() {
        const link = document.getElementById('finalLink').innerText;
        navigator.clipboard.writeText(link);
        alert("Link Copied!");
    }
</script>
</body>
</html>
