<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>P2P Fast File Transfer | Secure WhatsApp Share - Pintu Nishad</title>
    <meta name="description" content="Pintu Nishad द्वारा बनाई गई सुरक्षित और तेज़ P2P फाइल ट्रांसफर वेबसाइट। बिना किसी क्वालिटी लॉस के WhatsApp पर लिंक शेयर करें और पासवर्ड के साथ फाइल भेजें।">
    <meta name="keywords" content="P2P File Transfer, WhatsApp Share, Secure Sharing, Pintu Nishad, Fast File Share, No Quality Loss">
    <meta name="author" content="Pintu Nishad">
    <link rel="canonical" href="https://pintu-nishad.github.io/p2p-transfer/" />

    <meta name="google-site-verification" content="यहाँ_अपना_कोड_डालें" />

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root { --primary: #25D366; --dark: #128C7E; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: var(--dark); font-size: 22px; margin-bottom: 15px; }
        .box { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin: 15px 0; word-break: break-all; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-send { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-whatsapp { background: #075E54; color: white; border: none; font-weight: bold; cursor: pointer; display: none; }
        .btn-send:hover { background: var(--dark); }
        #status { font-weight: bold; color: #555; margin: 10px 0; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 P2P Fast Share</h1>
    <div id="status">सर्वर से जुड़ रहा है...</div>

    <div id="sender-ui">
        <p>फाइल चुनें और पासवर्ड बनाएँ</p>
        <input type="file" id="file-input">
        <input type="text" id="set-password" placeholder="सुरक्षा पासवर्ड (जैसे: 1234)">
        <button class="btn-send" onclick="generateLink()">सुरक्षित लिंक बनाएँ</button>
        
        <div id="link-area" class="hidden">
            <p>आपका लिंक तैयार है:</p>
            <div class="box" id="share-url"></div>
            <button class="btn-whatsapp" id="whatsapp-btn" onclick="shareToWhatsApp()">WhatsApp पर शेयर करें 💬</button>
        </div>
    </div>

    <div id="receiver-ui" class="hidden">
        <p>आपको एक फाइल भेजी गई है।</p>
        <input type="password" id="input-password" placeholder="पासवर्ड डालें">
        <button class="btn-send" onclick="connectAndReceive()">डाउनलोड शुरू करें</button>
    </div>

    <div id="download-area"></div>
    <div class="footer">Created by Pintu Nishad | No Server Storage (100% Private)</div>
</div>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Free Secure File Transfer | Fast P2P Share Online - Pintu Nishad</title>
    <meta name="description" content="Send files online for free with 100% security. Fast P2P file transfer with password protection and WhatsApp sharing. No quality loss, no server storage.">
    <meta name="keywords" content="free file transfer, secure file transfer, fast file share, P2P file transfer, send large files free, password protected file share, Pintu Nishad transfer">
    
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pintu-nishad.github.io/p2p-transfer/" />
</head>


<script>
    const peer = new Peer();
    let myId = "";

    // ऑटो-डिटेक्ट लिंक
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('id')) {
            document.getElementById('sender-ui').classList.add('hidden');
            document.getElementById('receiver-ui').classList.remove('hidden');
            document.getElementById('status').innerText = "फाइल प्राप्त करने के लिए तैयार";
        }
    };

    peer.on('open', (id) => {
        myId = id;
        document.getElementById('status').innerText = "ऑनलाइन - भेजने के लिए तैयार";
    });

    function generateLink() {
        const pass = document.getElementById('set-password').value;
        const file = document.getElementById('file-input').files[0];
        if(!file || !pass) return alert("फाइल और पासवर्ड दोनों ज़रूरी हैं!");
        
        const base_url = window.location.origin + window.location.pathname;
        const final_url = `${base_url}?id=${myId}&p=${btoa(pass)}`; 
        
        document.getElementById('share-url').innerText = final_url;
        document.getElementById('link-area').classList.remove('hidden');
        document.getElementById('whatsapp-btn').style.display = "block";
    }

    function shareToWhatsApp() {
        const url = document.getElementById('share-url').innerText;
        const pass = document.getElementById('set-password').value;
        const text = `नमस्ते! मैंने आपको एक सुरक्षित फाइल भेजी है।\n\n🔗 लिंक: ${url}\n🔑 पासवर्ड: ${pass}\n\n(लिंक खोलें और पासवर्ड डालकर डाउनलोड करें)`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    // रिसीवर लॉजिक
    function connectAndReceive() {
        const urlParams = new URLSearchParams(window.location.search);
        const senderId = urlParams.get('id');
        const encryptedPass = urlParams.get('p');
        const userPass = document.getElementById('input-password').value;

        if(userPass !== atob(encryptedPass)) return alert("गलत पासवर्ड!");

        document.getElementById('status').innerText = "सेंडर से कनेक्ट हो रहा है...";
        const conn = peer.connect(senderId);

        conn.on('open', () => {
            document.getElementById('status').innerText = "ट्रांसफर शुरू... (पेज खुला रखें)";
            conn.send({ type: 'REQ', pass: userPass });
        });

        conn.on('data', (data) => {
            if(data.type === 'FILE') {
                const blob = new Blob([data.file], { type: data.fileType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.click();
                document.getElementById('status').innerText = "सफलतापूर्वक डाउनलोड!";
            }
        });
    }

    // सेंडर लॉजिक
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.type === 'REQ') {
                const file = document.getElementById('file-input').files[0];
                const setPass = document.getElementById('set-password').value;
                if(data.pass === setPass) {
                    conn.send({ type: 'FILE', file: file, name: file.name, fileType: file.type });
                    document.getElementById('status').innerText = "फाइल भेजी जा रही है...";
                }
            }
        });
    });
</script>
</body>
</html>
