<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Share - P2P</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #008080; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        
        /* Progress Bar Styling */
        #progressContainer { display: none; margin: 15px 0; }
        progress { width: 100%; height: 20px; accent-color: #2ecc71; }
        
        /* Copy & Share Section */
        .link-box { background: #f9f9f9; padding: 10px; border: 1px border: dashed #ccc; word-break: break-all; margin-top: 15px; position: relative; }
        #copyBtn { background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; }
        #whatsappBtn { background: #075E54; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Send Large Files - Secure Share</h2>
    <p>फ़ाइल चुनें और सुरक्षित लिंक बनाएं</p>

    <input type="file" id="fileInput">
    <input type="password" id="passwordInput" placeholder="पासवर्ड (Optional)">
    
    <button id="sendBtn" style="background: #2ecc71; color: white; border: none; font-weight: bold;">सुरक्षित लिंक बनाएं</button>

    <div id="progressContainer">
        <progress id="progressBar" value="0" max="100"></progress>
        <p id="statusText">0% ट्रांसफर हो गया...</p>
    </div>

    <div id="linkSection" style="display:none;">
        <p>आपका लिंक तैयार है:</p>
        <div class="link-box">
            <span id="shareLink">https://pintu-nishad.github.io/p2p-transfer/?id=12345</span>
        </div>
        <button id="copyBtn" onclick="copyToClipboard()">लिंक कॉपी करें 📋</button>
        <button id="whatsappBtn">WhatsApp पर शेयर करें 💬</button>
    </div>
</div>

<script>
    const CHUNK_SIZE = 16384; // 16KB प्रति टुकड़ा
    let dataChannel; 
    // नोट: यहाँ आपकी WebRTC 'dataChannel' और 'peerConnection' की सेटिंग्स पहले से होनी चाहिए।

    // 1. कॉपी फंक्शन (Copy to Clipboard)
    function copyToClipboard() {
        const linkText = document.getElementById("shareLink").innerText;
        const btn = document.getElementById("copyBtn");

        navigator.clipboard.writeText(linkText).then(() => {
            btn.innerText = "कॉपी हो गया! ✅";
            btn.style.background = "#27ae60";
            setTimeout(() => {
                btn.innerText = "लिंक कॉपी करें 📋";
                btn.style.background = "#2ecc71";
            }, 2000);
        });
    }

    // 2. बड़ी फाइल ट्रांसफर और प्रोग्रेस बार लॉजिक
    document.getElementById('sendBtn').onclick = function() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("कृपया फाइल चुनें!");

        // लिंक सेक्शन दिखाएं (डेमो के लिए)
        document.getElementById('linkSection').style.display = "block";
        document.getElementById('progressContainer').style.display = "block";

        sendLargeFile(file);
    };

    function sendLargeFile(file) {
        const progressBar = document.getElementById("progressBar");
        const statusText = document.getElementById("statusText");
        
        let offset = 0;
        const reader = new FileReader();

        const sendNextChunk = () => {
            // बफर चेक: अगर ब्राउज़र का बफर फुल है, तो थोड़ा इंतज़ार करें
            if (dataChannel && dataChannel.bufferedAmount > dataChannel.bufferedAmountLowThreshold) {
                dataChannel.onbufferedamountlow = () => {
                    dataChannel.onbufferedamountlow = null;
                    sendNextChunk();
                };
                return;
            }

            const slice = file.slice(offset, offset + CHUNK_SIZE);
            reader.readAsArrayBuffer(slice);
        };

        reader.onload = (e) => {
            // डेटा भेजना (यहाँ सुनिश्चित करें कि dataChannel खुला है)
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(e.target.result);
            }

            offset += e.target.result.byteLength;

            // प्रोग्रेस अपडेट
            const percent = Math.round((offset / file.size) * 100);
            progressBar.value = percent;
            statusText.innerText = `${percent}% ट्रांसफर हो गया (${(offset / (1024 * 1024)).toFixed(2)} MB)`;

            if (offset < file.size) {
                sendNextChunk();
            } else {
                statusText.innerText = "फाइल सफलतापूर्वक भेज दी गई! ✅";
            }
        };

        sendNextChunk();
    }
</script>

</body>
</html>
